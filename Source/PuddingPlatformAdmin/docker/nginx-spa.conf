server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA HTML5 history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
