<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pudding Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
        header img { width: 36px; height: 36px; border-radius: 50%; }
        header h1 { font-size: 18px; font-weight: 500; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
        .msg.user { align-self: flex-end; background: #0f3460; }
        .msg.agent { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; }
        .msg.error { align-self: flex-start; background: #3e1a1a; border: 1px solid #6b2020; color: #f88; }
        footer { padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
        footer input { flex: 1; padding: 10px 16px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 14px; outline: none; }
        footer input:focus { border-color: #533483; }
        footer button { padding: 10px 20px; border: none; border-radius: 8px; background: #533483; color: #fff; font-size: 14px; cursor: pointer; }
        footer button:hover { background: #6b4fa0; }
        #status { text-align: center; padding: 4px; font-size: 11px; color: #666; }
        .loading { opacity: 0.6; }
    </style>
</head>
<body>
    <header>
        <img src="/me.png" alt="Pudding" onerror="this.style.display='none'" />
        <h1>Pudding Agent</h1>
    </header>
    <div id="chat"></div>
    <div id="status">Ready</div>
    <footer>
        <input type="text" id="input" placeholder="输入消息..." autofocus />
        <button id="send" onclick="send()">发送</button>
    </footer>

    <script>
        let sessionId = null;
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const status = document.getElementById('status');

        input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

        function addMsg(role, text, cls) {
            const div = document.createElement('div');
            div.className = 'msg ' + role + (cls ? ' ' + cls : '');
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMsg('user', msg);
            status.textContent = 'Sending...';

            try {
                const body = { message: msg };
                if (sessionId) body.sessionId = sessionId;
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                sessionId = data.sessionId;
                if (data.isSuccess) {
                    addMsg('agent', data.reply);
                    status.textContent = 'Ready';
                } else {
                    addMsg('agent', data.reply, 'error');
                    status.textContent = 'Error';
                }
            } catch (e) {
                addMsg('agent', 'Network error: ' + e.message, 'error');
                status.textContent = 'Error';
            }
        }
    </script>
</body>
</html>
