# ============================================================
# Pudding Agent Network — Docker Compose
# ============================================================
#
# 快速启动：
#   1. cp .env.example .env  并填写必要变量（至少 LLM_API_KEY）
#   2. docker compose up -d --build
#   3. 访问 http://localhost
#
# 服务端口（对外只暴露 Nginx）：
#   nginx                → localhost:80  （反向代理入口）
#   rabbitmq management  → localhost:15672（可选，开发用）

services:

  # ── 基础设施 ──────────────────────────────────────────────────

  postgres:
    image: postgres:15.2-alpine3.17
    environment:
      POSTGRES_DB:       pudding
      POSTGRES_USER:     pudding
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pudding_dev}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # 供宿主机 dotnet ef database update 使用
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U pudding"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - pudding-internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - pudding-internal
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: pudding
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-pudding_dev}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test:     ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    ports:
      - "15672:15672"   # RabbitMQ 管理界面（仅开发用，生产可移除）
    networks:
      - pudding-internal
    restart: unless-stopped

  # 可选：MQTT（物联网设备接入）
  # mosquitto:
  #   image: eclipse-mosquitto:2
  #   volumes:
  #     - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
  #     - mosquitto_data:/mosquitto/data
  #   networks:
  #     - pudding-internal
  #   restart: unless-stopped

  # ── 应用服务 ──────────────────────────────────────────────────

  pudding-platform:
    build:
      context:    .
      dockerfile: Source/PuddingPlatform/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS:  "8080"
      Pudding__ControllerEndpoint: http://pudding-controller:8080
      # PostgreSQL 连接串（覆盖 appsettings.json 中的 SQLite 默认值）
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=pudding;Username=pudding;Password=${POSTGRES_PASSWORD:-pudding_dev}"
      # JWT 签名密钥（生产环境必须替换为高强度随机值）
      Jwt__Key: ${JWT_KEY:-Pudding-Platform-JWT-DevKey-MUST-CHANGE-IN-PRODUCTION-32PLUS!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pudding-controller:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s
    networks:
      - pudding-internal
    restart: unless-stopped

  pudding-controller:
    build:
      context:    .
      dockerfile: Source/PuddingController/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS:  "8080"
      Pudding__RuntimeEndpoint: http://pudding-runtime:8080
      Pudding__LlmEndpoint: ${LLM_ENDPOINT:-https://api.openai.com/v1}
      Pudding__LlmApiKey:   ${LLM_API_KEY}
      Pudding__LlmModel:    ${LLM_MODEL:-gpt-4o-mini}
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=pudding;Username=pudding;Password=${POSTGRES_PASSWORD:-pudding_dev}"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      pudding-runtime:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s
    networks:
      - pudding-internal
    restart: unless-stopped

  pudding-runtime:
    build:
      context:    .
      dockerfile: Source/PuddingRuntime/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS:  "8080"
      Pudding__ControllerEndpoint: http://pudding-controller:8080
      Pudding__SelfEndpoint:       http://pudding-runtime:8080
    volumes:
      # 挂载 Docker socket，使 Runtime 能够管理 Agent 沙箱容器
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:         ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s
    networks:
      - pudding-internal
    restart: unless-stopped

  pudding-platform-admin:
    build:
      context:    Source/PuddingPlatformAdmin
      dockerfile: Dockerfile
    networks:
      - pudding-internal
    restart: unless-stopped

  # ── 反向代理（对外唯一入口）────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pudding-platform
      - pudding-controller
      - pudding-platform-admin
    networks:
      - pudding-internal
    restart: unless-stopped

# ── 持久化卷 ──────────────────────────────────────────────────────

volumes:
  redis_data:
  rabbitmq_data:
  # mosquitto_data:

# ── 内部网络 ──────────────────────────────────────────────────────

networks:
  pudding-internal:
    driver: bridge
