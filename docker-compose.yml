# ============================================================
# Pudding Agent — Docker Compose
# ============================================================
#
# 快速启动：
#   docker compose up -d --build
#   浏览器打开 http://localhost:8080
#
# 如需多 Agent P2P 组网:
#   docker compose up -d --build --scale pudding-agent=3

services:

  # ── 单进程（管理台 + 聊天 + LLM Runtime）──────────────
  pudding-agent:
    build:
      context:    .
      dockerfile: Source/PuddingAgent/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS:  "8080"
      PUDDING_LOG_LEVEL: ${PUDDING_LOG_LEVEL:-Debug}
      LLM_API_KEY:  ${LLM_API_KEY:-tp-c4tygz42vwumgqiae0l9ymt7m4s4czzoioxeum3dg7gze1hm}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-https://token-plan-cn.xiaomimimo.com/v1}
      LLM_MODEL:    ${LLM_MODEL:-mimo-v2.5-pro}
      MEMORY_LLM_ENDPOINT: ${MEMORY_LLM_ENDPOINT:-https://token-plan-cn.xiaomimimo.com/v1}
      MEMORY_LLM_API_KEY:  ${MEMORY_LLM_API_KEY:-tp-c4tygz42vwumgqiae0l9ymt7m4s4czzoioxeum3dg7gze1hm}
      MEMORY_LLM_MODEL_ID: ${MEMORY_LLM_MODEL_ID:-mimo-v2.5}
      Jwt__Key:        ${JWT_KEY:-Pudding-Platform-JWT-DevKey-MUST-CHANGE-IN-PRODUCTION-32PLUS!}
      Jwt__Issuer:     ${JWT_ISSUER:-pudding-platform}
      Jwt__Audience:   ${JWT_AUDIENCE:-pudding-admin}
      Jwt__ExpiryHours: "${JWT_EXPIRY_HOURS:-8}"
      ConnectionStrings__Default: "Data Source=/app/data/pudding_platform.db"
      Pudding__ControllerEndpoint: ${PUDDING_CONTROLLER_ENDPOINT:-http://localhost:8080}
      Pudding__RuntimeEndpoint: ${PUDDING_RUNTIME_ENDPOINT:-http://localhost:8080}
      P2P__Enabled: "true"
      P2P__Port:    "9527"
    ports:
      - "5000:8080"
      - "9527:9527/udp"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
