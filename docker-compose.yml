# ============================================================
# Pudding Agent — Docker Compose
# ============================================================
#
# 快速启动：
#   docker compose up -d --build
#   浏览器打开 http://localhost:8080
#
# 如需多 Agent P2P 组网:
#   docker compose up -d --build --scale pudding-agent=3

services:

  # ── 单进程（管理台 + 聊天 + LLM Runtime）──────────────
  pudding-agent:
    build:
      context:    .
      dockerfile: Source/PuddingAgent/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS:  "8080"
      LLM_API_KEY:  ${LLM_API_KEY}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-https://api.openai.com/v1}
      LLM_MODEL:    ${LLM_MODEL:-gpt-4o-mini}
      Jwt__Key:        ${JWT_KEY:-Pudding-Platform-JWT-DevKey-MUST-CHANGE-IN-PRODUCTION-32PLUS!}
      Jwt__Issuer:     ${JWT_ISSUER:-pudding-platform}
      Jwt__Audience:   ${JWT_AUDIENCE:-pudding-admin}
      Jwt__ExpiryHours: "${JWT_EXPIRY_HOURS:-8}"
      ConnectionStrings__Default: "Data Source=/app/data/pudding_platform.db"
      P2P__Enabled: "true"
      P2P__Port:    "9527"
    ports:
      - "8080:8080"
      - "9527:9527/udp"
    volumes:
      - agent_data:/app/data
    restart: unless-stopped

volumes:
  agent_data:
