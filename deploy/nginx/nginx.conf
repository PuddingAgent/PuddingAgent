# Pudding Agent Network — 反向代理配置
#
# 路由规则：
#   /api/          → pudding-controller:8080  （消息接入、会话路由）
#   /platform-api/ → pudding-platform:8080    （平台管理 API）
#   /              → pudding-platform-admin:80 （管理后台 SPA）

upstream pudding_controller {
    server pudding-controller:8080;
    keepalive 32;
}

upstream pudding_platform {
    server pudding-platform:8080;
    keepalive 16;
}

upstream pudding_platform_admin {
    server pudding-platform-admin:80;
    keepalive 16;
}

server {
    listen      80;
    server_name _;

    client_max_body_size 16m;

    # ── Controller API ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://pudding_controller;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Platform 管理 API ──────────────────────────────────────
    location /platform-api/ {
        rewrite            ^/platform-api/(.*)$ /$1 break;
        proxy_pass         http://pudding_platform;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 管理后台 SPA ────────────────────────────────────────────
    location / {
        proxy_pass         http://pudding_platform_admin;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
