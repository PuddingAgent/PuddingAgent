# Pudding Agent Network — 反向代理配置
#
# 路由规则：
#   /api/          → pudding-platform:8080    （平台管理 API，Admin SPA 使用）
#   /ingress/      → pudding-controller:8080  （外部消息接入，CLI/机器人等）
#   /              → pudding-platform-admin:80 （管理后台 SPA）
#
# 内部服务通信（不经过 Nginx）：
#   pudding-platform → pudding-controller:8080  （server-side，PlatformApiClient）
#   pudding-controller → pudding-runtime:8080   （server-side，RuntimeDispatcher）
#
# 注意：使用 Docker 内部 DNS（127.0.0.11）并在 location 中以变量形式传递上游地址，
# 使 nginx 在每次请求时动态 resolve 主机名，避免容器重建后 IP 变化导致 502。

server {
    listen      80;
    server_name _;

    # Docker 内置 DNS，valid=10s 表示每 10 秒重新 resolve 一次
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 16m;

    # ── Platform 管理 API（Admin SPA 所有 /api/ 请求）─────────
    location /api/ {
        set $upstream_platform http://pudding-platform:8080;
        proxy_pass         $upstream_platform;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── 外部消息接入（CLI / Telegram 等直接调 Controller）──────
    location /ingress/ {
        set $upstream_controller http://pudding-controller:8080;
        rewrite            ^/ingress/(.*)$ /api/$1 break;
        proxy_pass         $upstream_controller;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── 管理后台 SPA ────────────────────────────────────────────
    location / {
        set $upstream_admin http://pudding-platform-admin:80;
        proxy_pass         $upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
