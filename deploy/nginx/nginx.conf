# Pudding Agent Network — 反向代理配置
#
# 路由规则：
#   /api/          → pudding-platform:8080    （平台管理 API，Admin SPA 使用）
#   /ingress/      → pudding-controller:8080  （外部消息接入，CLI/机器人等）
#   /              → pudding-platform-admin:80 （管理后台 SPA）
#
# 内部服务通信（不经过 Nginx）：
#   pudding-platform → pudding-controller:8080  （server-side，PlatformApiClient）
#   pudding-controller → pudding-runtime:8080   （server-side，RuntimeDispatcher）

upstream pudding_controller {
    server pudding-controller:8080;
    keepalive 32;
}

upstream pudding_platform {
    server pudding-platform:8080;
    keepalive 16;
}

upstream pudding_platform_admin {
    server pudding-platform-admin:80;
    keepalive 16;
}

server {
    listen      80;
    server_name _;

    client_max_body_size 16m;

    # ── Platform 管理 API（Admin SPA 所有 /api/ 请求）─────────
    location /api/ {
        proxy_pass         http://pudding_platform;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── 外部消息接入（CLI / Telegram 等直接调 Controller）──────
    location /ingress/ {
        rewrite            ^/ingress/(.*)$ /api/$1 break;
        proxy_pass         http://pudding_controller;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── 管理后台 SPA ────────────────────────────────────────────
    location / {
        proxy_pass         http://pudding_platform_admin;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
